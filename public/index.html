<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page">
    <main class="home-shell">
      <div class="home-topbar">
        <a href="status.html">Status</a>
      </div>

      <section class="home-center">
        <div class="wordmark" aria-label="Aurora Search">Aurora Search</div>
        <p class="tagline">Search the web</p>

        <form class="home-form" action="search.html" method="get" autocomplete="off">
          <label class="search-label" for="search-input">Search Aurora</label>
          <input
            class="search-box"
            type="text"
            name="search"
            id="search-input"
            placeholder="Search the web..."
          />

          <div class="home-actions">
            <button class="action-btn action-btn-primary" type="submit">Search</button>
            <button class="action-btn" type="button" id="lucky-btn">I'm Feeling Lucky</button>
          </div>
        </form>
      </section>

      <footer class="home-footer">
        <span>Powered by SircoAuroraBot</span>
      </footer>
    </main>

    <script>
      const luckyQueries = [
        'space',
        'open source',
        'programming languages',
        'security news',
        'machine learning',
        'wikipedia',
        'hacker news'
      ];

      document.getElementById('lucky-btn').addEventListener('click', () => {
        const query = luckyQueries[Math.floor(Math.random() * luckyQueries.length)];
        window.location.href = `search.html?search=${encodeURIComponent(query)}`;
      });
    </script>
  </body>
</html>
